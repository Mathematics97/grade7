<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IGCSE Powers Worksheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600&amp;family=Instrument+Sans:wght@400;500&amp;display=swap');
        
        :root {
            --primary: #111827;
        }
        
        body {
            font-family: 'Instrument Sans', system_ui, sans-serif;
        }
        
        .display-font {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-weight: 600;
            letter-spacing: -0.025em;
        }

        .power-grid {
            background-image: 
                linear-gradient(#e5e7eb 1px, transparent 1px),
                linear-gradient(90deg, #e5e7eb 1px, transparent 1px);
            background-size: 32px 32px;
            background-position: 0 0;
        }

        .math-display {
            font-family: 'Space Grotesk', system_ui, sans-serif;
            font-feature-settings: "ss02";
        }

        .worksheet-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .input-field {
            transition: all 0.2s cubic-bezier(0.4, 0.0, 0.2, 1);
        }
        
        .input-field:focus {
            outline: none;
            box-shadow: 0 0 0 3px rgba(17, 24, 39, 0.1);
        }

        .result-correct {
            animation: pop 0.3s ease forwards;
        }

        .section-header {
            letter-spacing: -0.04em;
        }
    </style>
</head>
<body class="bg-zinc-50 py-8 px-4">
    <div class="max-w-[980px] mx-auto">
        <!-- Header -->
        <div class="flex items-end justify-between mb-8">
            <div>
                <div class="flex items-center gap-x-3">
                    <div class="w-9 h-9 bg-zinc-900 flex items-center justify-center rounded-xl">
                        <i class="fa-solid fa-calculator text-white text-2xl"></i>
                    </div>
                    <div>
                        <h1 class="display-font text-5xl font-semibold tracking-tighter text-zinc-900">Powers</h1>
                        <p class="text-zinc-600 text-xl tracking-tight">IGCSE Mathematics • Grade 7</p>
                    </div>
                </div>
            </div>
            
            <div class="flex items-center gap-x-2 bg-white border border-zinc-200 px-4 h-11 rounded-2xl shadow-sm">
                <div class="flex items-center">
                    <div class="w-2.5 h-2.5 bg-emerald-500 rounded-full animate-pulse"></div>
                    <span class="ml-2 text-sm font-medium text-zinc-600">20 questions</span>
                </div>
            </div>
        </div>

        <!-- Instructions -->
        <div class="mb-8 bg-white border border-zinc-200 rounded-3xl px-7 py-5">
            <div class="flex items-start gap-x-4">
                <div class="mt-1">
                    <i class="fa-solid fa-info-circle text-zinc-400 text-xl"></i>
                </div>
                <div>
                    <p class="text-zinc-700 font-medium">Calculate each power. Enter your answer in the box and click <span class="font-semibold">Check</span> to verify.</p>
                    <div class="mt-1.5 text-sm text-zinc-500">Bases shown: 2, 3, 4 and 5. Indices from 0 to 6.</div>
                </div>
            </div>
        </div>

        <!-- Worksheet Grid -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Base 2 -->
            <div class="worksheet-card bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-x-3">
                        <div class="px-3.5 py-1 bg-zinc-900 text-white text-sm font-semibold tracking-tighter rounded-2xl flex items-center justify-center w-8 h-8">2</div>
                        <span class="section-header text-2xl font-semibold text-zinc-900">Base 2</span>
                    </div>
                    <div class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-500 font-medium">6 questions</div>
                </div>
                
                <div class="space-y-3" id="base-2">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Base 3 -->
            <div class="worksheet-card bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-x-3">
                        <div class="px-3.5 py-1 bg-zinc-900 text-white text-sm font-semibold tracking-tighter rounded-2xl flex items-center justify-center w-8 h-8">3</div>
                        <span class="section-header text-2xl font-semibold text-zinc-900">Base 3</span>
                    </div>
                    <div class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-500 font-medium">6 questions</div>
                </div>
                
                <div class="space-y-3" id="base-3">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Base 4 -->
            <div class="worksheet-card bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-x-3">
                        <div class="px-3.5 py-1 bg-zinc-900 text-white text-sm font-semibold tracking-tighter rounded-2xl flex items-center justify-center w-8 h-8">4</div>
                        <span class="section-header text-2xl font-semibold text-zinc-900">Base 4</span>
                    </div>
                    <div class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-500 font-medium">6 questions</div>
                </div>
                
                <div class="space-y-3" id="base-4">
                    <!-- Populated by JS -->
                </div>
            </div>

            <!-- Base 5 -->
            <div class="worksheet-card bg-white border border-zinc-200 rounded-3xl p-6 shadow-sm">
                <div class="flex items-center justify-between mb-5">
                    <div class="flex items-center gap-x-3">
                        <div class="px-3.5 py-1 bg-zinc-900 text-white text-sm font-semibold tracking-tighter rounded-2xl flex items-center justify-center w-8 h-8">5</div>
                        <span class="section-header text-2xl font-semibold text-zinc-900">Base 5</span>
                    </div>
                    <div class="text-xs px-3 py-1 bg-zinc-100 rounded-2xl text-zinc-500 font-medium">6 questions</div>
                </div>
                
                <div class="space-y-3" id="base-5">
                    <!-- Populated by JS -->
                </div>
            </div>
        </div>
        
        <!-- Footer actions -->
        <div class="flex justify-center mt-9">
            <button onclick="resetAll()" 
                    class="flex items-center gap-x-2.5 text-zinc-700 hover:text-zinc-900 transition-colors px-6 py-3 bg-white border border-zinc-200 hover:bg-zinc-50 text-sm font-semibold rounded-2xl shadow-sm">
                <i class="fa-solid fa-redo text-xs"></i>
                <span>Reset All Answers</span>
            </button>
        </div>
    </div>

    <script>
        function createPowerRow(base, index, containerId) {
            const container = document.getElementById(containerId);
            const correctAnswer = Math.pow(base, index);
            
            const row = document.createElement('div');
            row.className = 'flex items-center gap-x-3 group';
            row.innerHTML = `
                <div class="flex items-center justify-center w-[74px] h-11 bg-zinc-900 text-white text-lg font-semibold tracking-[-0.03em] rounded-2xl flex-shrink-0">
                    <span class="font-mono">${base}</span><sup class="font-sans text-xs font-medium tracking-normal ml-0.5"> ${index}</sup>
                </div>
                
                <div class="flex-1 flex items-center">
                    <input type="number" 
                           class="input-field flex-1 h-11 px-4 text-lg font-medium bg-zinc-50 border border-zinc-200 focus:border-zinc-400 transition-colors placeholder:text-zinc-300 rounded-2xl"
                           placeholder="Answer"
                           id="input-${base}-${index}">
                    
                    <button onclick="checkAnswer(${base}, ${index}, ${correctAnswer}, this)"
                            class="ml-3 px-5 h-11 text-sm font-semibold tracking-[-0.01em] bg-white hover:bg-zinc-50 border border-zinc-200 text-zinc-800 transition-all active:scale-[0.985] rounded-2xl flex items-center justify-center gap-x-1.5">
                        <span>Check</span>
                    </button>
                </div>
            `;
            
            container.appendChild(row);
        }
        
        function checkAnswer(base, index, correctAnswer, buttonElement) {
            const inputId = `input-${base}-${index}`;
            const input = document.getElementById(inputId);
            const value = parseInt(input.value);
            
            if (input.value.trim() === '') {
                input.classList.add('border-red-300', 'bg-red-50');
                setTimeout(() => {
                    input.classList.remove('border-red-300', 'bg-red-50');
                }, 900);
                return;
            }
            
            const row = buttonElement.parentElement.parentElement;
            
            if (value === correctAnswer) {
                // Correct
                input.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700', 'font-medium');
                input.disabled = true;
                buttonElement.outerHTML = `
                    <div class="ml-3 px-4 h-11 flex items-center justify-center gap-x-2 text-emerald-600">
                        <i class="fa-solid fa-check text-lg"></i>
                    </div>
                `;
                row.classList.add('result-correct');
            } else {
                // Incorrect
                input.classList.add('border-red-300', 'bg-red-50', 'text-red-600');
                
                const feedback = document.createElement('div');
                feedback.className = `ml-3 flex-shrink-0 text-xs font-medium px-4 text-red-600 flex items-center h-11`;
                feedback.innerHTML = `<span class="font-mono">= ${correctAnswer}</span>`;
                
                buttonElement.replaceWith(feedback);
                
                setTimeout(() => {
                    input.classList.remove('border-red-300', 'bg-red-50', 'text-red-600');
                }, 1600);
            }
        }
        
        function resetAll() {
            const inputs = document.querySelectorAll('input[id^="input-"]');
            inputs.forEach(input => {
                input.value = '';
                input.disabled = false;
                input.classList.remove('border-emerald-500', 'bg-emerald-50', 'text-emerald-700', 'border-red-300', 'bg-red-50', 'text-red-600', 'font-medium');
            });
            
            // Refresh the page to rebuild buttons (simple reset)
            window.location.reload();
        }
        
        function initializeWorksheet() {
            const bases = [2, 3, 4, 5];
            const indices = [0, 1, 2, 3, 4, 5, 6];
            
            bases.forEach(base => {
                const containerId = `base-${base}`;
                const container = document.getElementById(containerId);
                container.innerHTML = '';
                
                indices.forEach(index => {
                    createPowerRow(base, index, containerId);
                });
            });
        }
        
        // Initialize on load
        window.onload = function() {
            initializeWorksheet();
            
            // Add keyboard support
            document.addEventListener('keypress', function(e) {
                if (e.key === "Enter") {
                    const focusedInput = document.activeElement;
                    if (focusedInput && focusedInput.id.startsWith('input-')) {
                        const match = focusedInput.id.match(/input-(\d+)-(\d+)/);
                        if (match) {
                            const base = parseInt(match[1]);
                            const index = parseInt(match[2]);
                            const container = focusedInput.parentElement.parentElement;
                            const button = container.querySelector('button');
                            if (button) button.click();
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
```
